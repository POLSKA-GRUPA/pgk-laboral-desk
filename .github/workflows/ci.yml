name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laboral-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install 'ruff>=0.4'
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laboral-backend
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laboral-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: laboral-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t pgk-laboral-desk:latest .
